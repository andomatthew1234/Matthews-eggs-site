<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Response Submitted - King Royalty Eggs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:url('img/pop-bg.jpg') center/cover no-repeat fixed;
    color:white;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    position:relative;
}

/* Overlay */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    z-index:0;
}

/* Main Box */

.container{
    position:relative;
    z-index:2;

    width:min(90%,700px);

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:30px;

    padding:4rem 2rem;

    text-align:center;

    animation:fadeUp 0.8s ease;
}

/* Tick Circle */

.tick-wrap{
    width:120px;
    height:120px;

    margin:0 auto 2rem;

    border-radius:50%;

    background:rgba(255,215,0,0.12);

    display:flex;
    justify-content:center;
    align-items:center;

    animation:pulse 2s infinite;
}

/* Tick */

.tick{
    width:50px;
    height:25px;

    border-left:6px solid gold;
    border-bottom:6px solid gold;

    transform:rotate(-45deg);

    animation:drawTick 0.8s ease forwards;
}

/* Text */

h1{
    font-size:clamp(2rem,5vw,3.5rem);
    margin-bottom:1rem;
}

p{
    color:#ddd;
    line-height:1.7;
    font-size:1.1rem;

    margin-bottom:2rem;
}

/* Button */

.btn{
    display:inline-block;

    background:gold;
    color:black;

    text-decoration:none;
    font-weight:600;

    padding:1rem 2rem;
    border-radius:999px;

    transition:0.3s ease;
}

.btn:hover{
    transform:translateY(-4px);
}

/* Animations */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }

}

@keyframes drawTick{

    from{
        opacity:0;
        transform:rotate(-45deg) scale(0.5);
    }

    to{
        opacity:1;
        transform:rotate(-45deg) scale(1);
    }

}

/* Mobile */

@media(max-width:700px){

    .container{
        padding:3rem 1.5rem;
    }

    .tick-wrap{
        width:100px;
        height:100px;
    }

}

</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <div class="tick-wrap">
        <div class="tick"></div>
    </div>

    <h1>We got your response.</h1>

    <p>
        Thanks for submitting the contact form!
    </p>

    <a class="btn" href="https://kingroyaltyeggs.com">
        Back to website
    </a>

</div>

</body>
</html>
