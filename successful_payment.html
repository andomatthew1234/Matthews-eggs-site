<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks. Your payment was successful. • King Royalty Eggs</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:'Poppins',sans-serif;background:#110c07;color:#fff;background-image:linear-gradient(180deg,rgba(0,0,0,0.85),rgba(0,0,0,0.95)),url('img/pop-bg.jpg');background-size:cover;background-position:center;}
    .page{max-width:780px;width:100%;background:linear-gradient(180deg,rgba(11,10,9,0.96),rgba(17,12,7,0.95));border:1px solid rgba(255,215,0,0.22);border-radius:28px;backdrop-filter:blur(18px);padding:3rem;box-shadow:0 35px 90px rgba(0,0,0,0.45);}
    .hero{display:flex;align-items:center;justify-content:center;margin-bottom:1.8rem;}
    h1{font-size:clamp(2.2rem,4vw,3.4rem);margin-bottom:0;color:#fff;text-align:center;line-height:1.05;}
    .subtitle{color:#f5e6b8;text-align:center;margin-bottom:1.8rem;font-size:1rem;max-width:640px;margin:0 auto;line-height:1.75;}
    .count{margin:0 auto 1.8rem auto;padding:1.3rem 1.4rem;border-radius:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,215,0,0.18);text-align:center;font-size:1.05rem;color:#fff;max-width:640px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03);}
    .btn{display:inline-block;margin:0 auto;padding:1rem 1.9rem;border-radius:999px;background:linear-gradient(135deg,#ffd700,#f7c700 55%,#f3a800);color:#111;font-weight:700;text-decoration:none;transition:transform 0.2s ease,box-shadow 0.2s ease;cursor:pointer;box-shadow:0 18px 30px rgba(255,182,0,0.25);}
    .btn:hover{transform:translateY(-3px);box-shadow:0 20px 40px rgba(255,182,0,0.3);}
    .note{font-size:0.98rem;color:#e4dcc8;text-align:center;margin-top:1.25rem;line-height:1.7;}

    @media(max-width:700px){
        body{padding:1rem;}
        .page{padding:2rem;}
        h1{font-size:2.2rem;}
        .subtitle{font-size:0.95rem;max-width:100%;}
        .count{padding:1.2rem 1rem;font-size:1rem;}
        .btn{width:100%;padding:1.1rem 1.2rem;}
    }
</style>
</head>
<body>
<div class="page">
    <div class="hero">
        <h1>Thanks. Your payment was successful.</h1>
    </div>
    <p class="subtitle">Thank you for supporting King Royalty. Your recent payment has been recorded.</p>
    <div class="count" id="purchaseCountText">Updating your total…</div>
    <a class="btn" id="backButton" href="index.html">Back to King Royalty</a>
    <p class="note">New features will be unlocked if you have enough completed purchases.</p>
</div>
<script>
    const PURCHASE_COUNT_KEY = 'krPurchaseCount';

    function getPurchaseCount(){
        return parseInt(localStorage.getItem(PURCHASE_COUNT_KEY) || '0', 10);
    }

    function isReload(){
        const navEntries = performance.getEntriesByType('navigation');
        if(navEntries && navEntries.length){
            return navEntries[0].type === 'reload';
        }
        if(performance.navigation){
            return performance.navigation.type === performance.navigation.TYPE_RELOAD;
        }
        return false;
    }

    function recordPurchase(){
        if(isReload()){
            return false;
        }
        const count = getPurchaseCount() + 1;
        localStorage.setItem(PURCHASE_COUNT_KEY, count);
        return true;
    }

    function updateCountDisplay(){
        const count = getPurchaseCount();
        document.getElementById('purchaseCountText').textContent = `We've recorded ${count} completed purchases in this browser.`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const incremented = recordPurchase();
        updateCountDisplay();
        if(incremented){
            document.getElementById('purchaseCountText').textContent = `We've recorded ${getPurchaseCount()} completed purchases in this browser.`;
        }
    });
</script>
</body>
</html>
