<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frypan Dodge | King Royalty</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --danger: #ff4757;
            --success: #2ed573;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .top-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .nav-btn {
            padding: 12px 20px;
            background: #1e293b;
            color: white;
            border: 2px solid #334155;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: #334155;
            border-color: #475569;
            transform: translateY(-2px);
        }

        .header-area {
            text-align: center;
            margin-bottom: 20px;
            z-index: 5;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 1000px;
            height: 70vh;
            background: var(--surface);
            border: 4px solid #334155;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- Gameplay Elements --- */
        #chicken {
            position: absolute;
            bottom: 30px;
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50% 50% 45% 45%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        #chicken::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            background: #ffcc00;
            border-radius: 50%;
        }

        .obstacle {
            position: absolute;
            width: 60px;
            height: 20px;
            background: #333;
            border-radius: 4px;
            box-shadow: 0 8px 0 #111;
        }
        
        .obstacle::after {
            content: '';
            position: absolute;
            right: -30px;
            top: 5px;
            width: 30px;
            height: 8px;
            background: #555;
            border-radius: 0 4px 4px 0;
        }

        .golden-egg {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: black;
            font-size: 14px;
            box-shadow: 0 0 15px var(--primary);
        }

        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .score-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            display: block;
        }

        #score {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
        }

        /* --- Overlays & Modals --- */
        #message-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            text-align: center;
            padding: 40px;
        }

        .hidden {
            display: none !important;
        }

        #challenges-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 100%;
            background: #111827;
            border-right: 2px solid #334155;
            z-index: 110;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #challenges-panel.open {
            transform: translateX(0);
        }

        .challenge-item {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #334155;
        }

        .challenge-item.completed {
            border-color: var(--success);
            background: rgba(46, 213, 115, 0.1);
        }

        .challenge-info h4 {
            margin: 0;
            font-size: 0.9rem;
            color: white;
        }

        .challenge-info p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: left;
        }

        .check-box {
            width: 24px;
            height: 24px;
            border: 2px solid #475569;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--success);
            font-weight: 900;
        }

        .completed .check-box {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        /* --- Buttons --- */
        .action-btn {
            padding: 16px 48px;
            font-size: 1.25rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            margin-top: 25px;
            box-shadow: 0 8px 0 #b8860b;
            transition: 0.1s;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b8860b;
        }

        #speed-o-meter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #475569;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="window.close()">✕ Exit</button>
        <button class="nav-btn" onclick="toggleChallenges()">🎁 Challenges</button>
    </div>

    <div id="challenges-panel">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0; color: var(--primary);">Challenges</h2>
            <button onclick="toggleChallenges()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.5rem;">✕</button>
        </div>
        <div id="challenges-list">
            <!-- Challenges populated by JS -->
        </div>
    </div>

    <div class="header-area">
        <h1>🍳 Frypan Dodge</h1>
        <p>Stay out of the pan! Move with A/D or Arrows.</p>
    </div>

    <div id="game-container">
        <div id="ui">
            <span class="score-label">Current Score</span>
            <span id="score">0</span>
        </div>

        <div id="speed-o-meter">Heat: <span id="speed-val">0</span>%</div>

        <div id="chicken"></div>

        <div id="message-overlay">
            <h2 id="msg-title" style="font-size: 3rem; margin-bottom: 10px;">GET READY</h2>
            <p id="msg-text" style="font-size: 1.2rem; max-width: 400px; color: var(--text-muted);">The kitchen is heating up. Avoid the pans and grab the golden yolks!</p>
            <button class="action-btn" onclick="startGame()">START COOKING</button>
        </div>
    </div>

    <script>
        const chicken = document.getElementById('chicken');
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed-val');
        const overlay = document.getElementById('message-overlay');
        const msgTitle = document.getElementById('msg-title');
        const challengesPanel = document.getElementById('challenges-panel');
        const challengesList = document.getElementById('challenges-list');
        
        let score = 0;
        let gameActive = false;
        let speed = 4; 
        const minSpeed = 4;
        const maxSpeed = 18;
        let obstacles = [];
        let eggs = [];
        let maxHeatReached = 0;

        let containerWidth = container.clientWidth;
        let containerHeight = container.clientHeight;
        let chickenX = (containerWidth / 2) - 25;

        // Challenge Definition
        const challenges = [
            { id: 'chef1', title: 'Junior Chef', desc: 'Reach a score of 50', targetScore: 50 },
            { id: 'chef2', title: 'Line Cook', desc: 'Reach 25% Heat', targetHeat: 25 },
            { id: 'chef3', title: 'Sous Chef', desc: 'Reach a score of 150', targetScore: 150 },
            { id: 'chef4', title: 'Head Chef', desc: 'Reach 60% Heat', targetHeat: 60 },
            { id: 'chef5', title: 'Executive Chef', desc: 'Reach a score of 300', targetScore: 300 },
            { id: 'chef6', title: 'King Royalty', desc: 'Reach 95% Heat', targetHeat: 95 }
        ];

        let completedChallenges = JSON.parse(localStorage.getItem('frypan_challenges')) || [];

        function renderChallenges() {
            challengesList.innerHTML = '';
            challenges.forEach(c => {
                const isDone = completedChallenges.includes(c.id);
                const item = document.createElement('div');
                item.className = `challenge-item ${isDone ? 'completed' : ''}`;
                item.innerHTML = `
                    <div class="challenge-info">
                        <h4>${c.title}</h4>
                        <p>${c.desc}</p>
                    </div>
                    <div class="check-box">${isDone ? '✓' : ''}</div>
                `;
                challengesList.appendChild(item);
            });
        }

        function checkChallenges() {
            let changed = false;
            const currentHeat = parseInt(speedEl.textContent);
            
            challenges.forEach(c => {
                if (!completedChallenges.includes(c.id)) {
                    if (c.targetScore && score >= c.targetScore) {
                        completedChallenges.push(c.id);
                        changed = true;
                    }
                    if (c.targetHeat && currentHeat >= c.targetHeat) {
                        completedChallenges.push(c.id);
                        changed = true;
                    }
                }
            });

            if (changed) {
                localStorage.setItem('frypan_challenges', JSON.stringify(completedChallenges));
                renderChallenges();
            }
        }

        function toggleChallenges() {
            challengesPanel.classList.toggle('open');
        }

        window.addEventListener('resize', () => {
            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;
        });

        const keys = {};
        document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function startGame() {
            if(challengesPanel.classList.contains('open')) toggleChallenges();
            score = 0;
            speed = minSpeed;
            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;
            chickenX = (containerWidth / 2) - 25;
            chicken.style.left = chickenX + 'px';

            obstacles.forEach(o => o.remove());
            eggs.forEach(e => e.remove());
            obstacles = [];
            eggs = [];
            
            scoreEl.textContent = score;
            overlay.classList.add('hidden');
            gameActive = true;
            requestAnimationFrame(gameLoop);
        }

        function spawn() {
            if (!gameActive) return;
            let obstacleRate = 0.04 + (speed - minSpeed) * 0.008;
            let eggRate = 0.015;

            if (Math.random() < obstacleRate) {
                const obs = document.createElement('div');
                obs.className = 'obstacle';
                const maxX = containerWidth - 90;
                obs.style.left = (Math.random() * maxX) + 'px';
                obs.style.top = '-60px';
                container.appendChild(obs);
                obstacles.push(obs);
            }

            if (Math.random() < eggRate) {
                const egg = document.createElement('div');
                egg.className = 'golden-egg';
                egg.textContent = '🍳';
                const maxX = containerWidth - 30;
                egg.style.left = (Math.random() * maxX) + 'px';
                egg.style.top = '-60px';
                container.appendChild(egg);
                eggs.push(egg);
            }
        }

        function gameLoop() {
            if (!gameActive) return;

            if (speed < maxSpeed) speed += 0.0045;
            
            const heatPercent = Math.min(100, Math.floor(((speed - minSpeed) / (maxSpeed - minSpeed)) * 100));
            speedEl.textContent = heatPercent;

            const moveSpeed = 10 + (speed * 0.2);
            if ((keys['arrowleft'] || keys['a']) && chickenX > 0) chickenX -= moveSpeed;
            if ((keys['arrowright'] || keys['d']) && chickenX < containerWidth - 50) chickenX += moveSpeed;
            chicken.style.left = chickenX + 'px';

            const playerRect = chicken.getBoundingClientRect();
            const pBox = {
                top: playerRect.top + 8,
                bottom: playerRect.bottom - 8,
                left: playerRect.left + 8,
                right: playerRect.right - 8
            };

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                let top = parseFloat(obs.style.top);
                top += speed;
                obs.style.top = top + 'px';

                const r2 = obs.getBoundingClientRect();
                if (!(pBox.right < r2.left || pBox.left > r2.right || pBox.bottom < r2.top || pBox.top > r2.bottom)) {
                    gameOver();
                    return;
                }

                if (top > containerHeight) {
                    obs.remove();
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.textContent = score;
                }
            }

            for (let i = eggs.length - 1; i >= 0; i--) {
                let egg = eggs[i];
                let top = parseFloat(egg.style.top);
                top += speed;
                egg.style.top = top + 'px';

                const r2 = egg.getBoundingClientRect();
                if (!(pBox.right < r2.left || pBox.left > r2.right || pBox.bottom < r2.top || pBox.top > r2.bottom)) {
                    score += 15;
                    scoreEl.textContent = score;
                    egg.remove();
                    eggs.splice(i, 1);
                    continue; 
                }

                if (top > containerHeight) {
                    egg.remove();
                    eggs.splice(i, 1);
                }
            }

            spawn();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            checkChallenges(); // Check milestones on death
            msgTitle.textContent = "FRIED!";
            msgTitle.style.color = "var(--danger)";
            document.getElementById('msg-text').textContent = `You lasted until the heat reached ${speedEl.textContent}%. Total Score: ${score}`;
            overlay.classList.remove('hidden');
        }

        // Init
        renderChallenges();
    </script>
</body>
</html>
